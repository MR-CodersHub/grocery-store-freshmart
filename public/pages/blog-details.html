<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16a34a" />
    <meta name="description" content="FreshMart Blog — Read the full article." />
    <title>Blog Article — FreshMart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Poppins', 'sans-serif'], display: ['Pacifico', 'cursive'] },
            colors: {
              brand: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' },
              cream: '#fefce8',
              ink: '#1f2937',
            },
            boxShadow: { soft: '0 10px 30px -10px rgba(22, 163, 74, 0.25)' },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="../../src/css/style.css" />
    <style>
      .article-content h2 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-top: 2rem;
        margin-bottom: 0.75rem;
        color: #1f2937;
      }
      .article-content p {
        margin-bottom: 1rem;
        line-height: 1.8;
        color: #4b5563;
      }
      .article-content ul, .article-content ol {
        margin-bottom: 1rem;
        padding-left: 1.5rem;
      }
      .article-content li {
        margin-bottom: 0.5rem;
        line-height: 1.7;
        color: #4b5563;
      }
      html.dark .article-content h2 { color: #f1f5f9; }
      html.dark .article-content p { color: #94a3b8; }
      html.dark .article-content li { color: #94a3b8; }
    </style>
  </head>
  <body class="font-sans text-ink bg-white dark:bg-gray-900 dark:text-gray-100 antialiased">
    <div id="navbar-placeholder"></div>

    <main id="top">

      <!-- ARTICLE HEADER -->
      <section id="article-header" class="relative overflow-hidden bg-gradient-to-br from-cream via-white to-brand-50 dark:from-gray-900 dark:via-gray-900 dark:to-gray-800">
        <div class="max-w-4xl mx-auto px-4 pt-12 pb-8 md:pt-16 md:pb-10">
          <div class="reveal">
            <a href="blog.html" class="inline-flex items-center gap-2 text-brand-600 hover:text-brand-700 text-sm font-semibold mb-6">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              Back to Blog
            </a>
            <div id="article-category" class="inline-block px-3 py-1 rounded-full bg-brand-100 dark:bg-brand-900/30 text-brand-700 dark:text-brand-400 text-xs font-semibold mb-4"></div>
            <h1 id="article-title" class="text-3xl md:text-4xl lg:text-5xl font-extrabold leading-tight tracking-tight"></h1>
            <div id="article-meta" class="mt-6 flex flex-wrap items-center gap-4 text-sm text-gray-500 dark:text-gray-400">
              <!-- Rendered by JS -->
            </div>
          </div>
        </div>
      </section>

      <!-- FEATURED IMAGE -->
      <section class="bg-white dark:bg-gray-900">
        <div class="max-w-5xl mx-auto px-4 p-8 reveal">
          <div id="featured-image-wrapper" class="relative -mt-2 rounded-3xl overflow-hidden shadow-soft aspect-[21/9]">
            <img id="featured-image" src="" alt="" loading="eager" class="w-full h-full object-cover" />
          </div>
        </div>
      </section>

      <!-- ARTICLE BODY -->
      <section class="py-12 md:py-16 bg-white dark:bg-gray-900">
        <div class="max-w-3xl mx-auto px-4">
          <div id="article-content" class="article-content text-lg leading-relaxed reveal">
            <!-- Rendered by JS -->
          </div>
        </div>
      </section>

      <!-- SHARE BUTTONS -->
      <section class="py-8 bg-white dark:bg-gray-900 border-t border-gray-100 dark:border-gray-800">
        <div class="max-w-3xl mx-auto px-4">
          <div class="flex items-center justify-between flex-wrap gap-4 reveal">
            <div class="flex items-center gap-3">
              <span class="text-sm font-semibold text-gray-700 dark:text-gray-300">Share this article:</span>
              <div class="flex gap-2">
                <button class="share-btn grid place-items-center w-9 h-9 rounded-full bg-blue-500 hover:bg-blue-600 text-white transition" aria-label="Share on Facebook">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.7-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.3c-1.2 0-1.6.8-1.6 1.6V12h2.7l-.4 2.9h-2.3v7A10 10 0 0 0 22 12z"/></svg>
                </button>
                <button class="share-btn grid place-items-center w-9 h-9 rounded-full bg-sky-500 hover:bg-sky-600 text-white transition" aria-label="Share on Twitter">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                </button>
                <button class="share-btn grid place-items-center w-9 h-9 rounded-full bg-green-500 hover:bg-green-600 text-white transition" aria-label="Share on WhatsApp">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                </button>
                <button id="copy-link-btn" class="share-btn grid place-items-center w-9 h-9 rounded-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 transition" aria-label="Copy link">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- AUTHOR BIO -->
      <section class="py-12 bg-white dark:bg-gray-900">
        <div class="max-w-3xl mx-auto px-4">
          <div class="bg-cream dark:bg-gray-800 rounded-3xl p-6 md:p-8 reveal">
            <div class="flex items-start gap-5">
              <div id="author-avatar" class="w-16 h-16 rounded-full bg-brand-200 dark:bg-brand-800 shrink-0 overflow-hidden">
                <div class="w-full h-full flex items-center justify-center text-brand-700 dark:text-brand-300 font-bold text-xl"></div>
              </div>
              <div>
                <p class="text-xs text-gray-500 dark:text-gray-400 font-semibold uppercase tracking-wider mb-1">Written by</p>
                <h3 id="author-name" class="font-bold text-lg text-gray-900 dark:text-white"></h3>
                <p id="author-bio" class="mt-2 text-sm text-gray-600 dark:text-gray-400 leading-relaxed"></p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- RELATED ARTICLES -->
      <section class="py-12 md:py-16 bg-cream dark:bg-gray-800">
        <div class="max-w-7xl mx-auto px-4">
          <div class="text-center mb-10 reveal">
            <p class="text-brand-600 font-semibold text-sm uppercase tracking-wider">Keep reading</p>
            <h2 class="text-3xl md:text-4xl font-extrabold mt-1">Related Articles</h2>
          </div>
          <div id="related-articles" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Rendered by JS -->
          </div>
        </div>
      </section>

    </main>

    <div id="footer-placeholder"></div>

    <script src="../../src/js/data.js"></script>
    <script src="../../src/js/cart.js"></script>
    <script src="../../src/js/navbar.js"></script>
    <script src="../../src/js/footer.js"></script>
    <script src="../../src/js/theme.js"></script>
    <script src="../../src/js/form-validation.js"></script>
    <script src="../../src/js/blog.js"></script>
    <script src="../../src/js/script.js"></script>

    <script>
      (() => {
        'use strict';

        const base = FreshMartNavbar.getBasePath();
        const params = new URLSearchParams(window.location.search);
        const postId = params.get('id');

        const { BLOG_POSTS } = FreshMartData;

        const post = BLOG_POSTS.find(p => p.id === postId) || BLOG_POSTS[0];

        if (!post) {
          document.querySelector('#top').innerHTML = `
            <section class="py-32 text-center">
              <div class="max-w-xl mx-auto px-4">
                <div class="text-6xl mb-6">📝</div>
                <h1 class="text-3xl md:text-4xl font-extrabold mb-4">Post Not Found</h1>
                <p class="text-gray-600 dark:text-gray-400 mb-8">The article you're looking for doesn't exist or has been removed.</p>
                <a href="blog.html" class="inline-flex items-center gap-2 px-6 py-3 rounded-full bg-brand-600 hover:bg-brand-700 text-white font-semibold shadow-soft transition btn-pop">
                  Browse All Articles
                </a>
              </div>
            </section>`;
          return;
        }

        document.title = `${post.title} — FreshMart Blog`;

        document.getElementById('article-category').textContent = post.category;
        document.getElementById('article-title').textContent = post.title;

        document.getElementById('article-meta').innerHTML = `
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-brand-200 dark:bg-brand-800 flex items-center justify-center text-brand-700 dark:text-brand-300 font-bold text-sm">${post.author.split(' ').map(n => n[0]).join('')}</div>
            <div>
              <div class="font-semibold text-gray-900 dark:text-white">${post.author}</div>
              <div class="text-xs text-gray-500 dark:text-gray-400">${FreshMartBlog.formatDate(post.date)}</div>
            </div>
          </div>
          <span class="text-gray-300 dark:text-gray-600">|</span>
          <span>${post.readTime} read</span>
          <span class="text-gray-300 dark:text-gray-600">|</span>
          <span>${post.category}</span>
        `;

        const featuredImage = document.getElementById('featured-image');
        featuredImage.src = post.img;
        featuredImage.alt = post.title;

        document.getElementById('article-content').innerHTML = post.content;

        const authorBios = {
          'Sarah Mitchell': 'Lifestyle writer and sustainability advocate. Sarah covers topics from seasonal eating to eco-friendly living. She believes small changes in daily habits can make a big impact on the planet.',
          'Chef Marcus': 'Head Chef Partner at FreshMart. Marcus designs meal kits and creates recipes that make fresh, healthy cooking accessible to everyone. He trained at Le Cordon Bleu and has over 15 years of culinary experience.',
          'Dr. Lisa Chen': 'Nutritionist and health researcher. Dr. Chen writes evidence-based articles about the benefits of organic food, healthy eating, and wellness. She holds a PhD in Nutritional Science from Stanford.'
        };

        document.getElementById('author-name').textContent = post.author;
        document.getElementById('author-bio').textContent = authorBios[post.author] || 'Contributing writer for FreshMart. Passionate about fresh food, healthy living, and sharing knowledge with our community.';

        const authorInitials = post.author.split(' ').map(n => n[0]).join('');
        document.getElementById('author-avatar').innerHTML = `<div class="w-full h-full flex items-center justify-center text-brand-700 dark:text-brand-300 font-bold text-xl">${authorInitials}</div>`;

        const relatedPosts = BLOG_POSTS.filter(p => p.id !== post.id).slice(0, 3);
        const relatedGrid = document.getElementById('related-articles');
        relatedGrid.innerHTML = relatedPosts.map(rp => `
          <a href="blog-details.html?id=${rp.id}" class="blog-card block bg-white dark:bg-gray-800 rounded-2xl overflow-hidden border border-gray-100 dark:border-gray-700 reveal">
            <div class="aspect-video overflow-hidden bg-gray-100 dark:bg-gray-700">
              <img src="${rp.img}" alt="${rp.title}" loading="lazy" class="blog-image w-full h-full object-cover" />
            </div>
            <div class="p-5">
              <div class="flex items-center gap-3 text-xs text-gray-500 dark:text-gray-400 mb-2">
                <span class="px-2.5 py-1 rounded-full bg-brand-50 dark:bg-brand-900/30 text-brand-700 dark:text-brand-400 font-semibold">${rp.category}</span>
                <span>${FreshMartBlog.formatDate(rp.date)}</span>
                <span>${rp.readTime} read</span>
              </div>
              <h3 class="font-bold text-lg text-gray-900 dark:text-white leading-snug hover:text-brand-600 transition line-clamp-2">${rp.title}</h3>
              <p class="text-sm text-gray-600 dark:text-gray-400 mt-2 line-clamp-2">${rp.excerpt}</p>
            </div>
          </a>
        `).join('');

        if (typeof window.initReveal === 'function') { window.initReveal(); }

        document.getElementById('copy-link-btn').addEventListener('click', () => {
          navigator.clipboard.writeText(window.location.href).then(() => {
            const btn = document.getElementById('copy-link-btn');
            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
            btn.classList.add('bg-brand-500', 'text-white');
            btn.classList.remove('bg-gray-200', 'dark:bg-gray-700', 'text-gray-700', 'dark:text-gray-300');
            setTimeout(() => {
              btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>';
              btn.classList.remove('bg-brand-500', 'text-white');
              btn.classList.add('bg-gray-200', 'dark:bg-gray-700', 'text-gray-700', 'dark:text-gray-300');
            }, 2000);
          });
        });

        document.querySelectorAll('.share-btn').forEach(btn => {
          if (btn.id === 'copy-link-btn') return;
          btn.addEventListener('click', () => {
            const url = encodeURIComponent(window.location.href);
            const title = encodeURIComponent(post.title);
            let shareUrl = '';
            if (btn.getAttribute('aria-label') === 'Share on Facebook') {
              shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
            } else if (btn.getAttribute('aria-label') === 'Share on Twitter') {
              shareUrl = `https://twitter.com/intent/tweet?url=${url}&text=${title}`;
            } else if (btn.getAttribute('aria-label') === 'Share on WhatsApp') {
              shareUrl = `https://wa.me/?text=${title}%20${url}`;
            }
            if (shareUrl) window.open(shareUrl, '_blank', 'width=600,height=400');
          });
        });

      })();
    </script>
  </body>
</html>
