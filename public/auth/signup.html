<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16a34a" />
    <meta name="description" content="Create your FreshMart account — start getting fresh groceries delivered to your door." />
    <title>Sign Up — FreshMart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Poppins', 'sans-serif'], display: ['Pacifico', 'cursive'] },
            colors: {
              brand: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' },
              cream: '#fefce8',
              ink: '#1f2937',
            },
            boxShadow: { soft: '0 10px 30px -10px rgba(22, 163, 74, 0.25)' },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="../../src/css/style.css" />
  </head>
  <body class="font-sans text-ink bg-white dark:bg-gray-900 dark:text-gray-100 antialiased">
    <div id="navbar-placeholder"></div>

    <main class="min-h-screen flex items-center justify-center py-12 px-4 bg-gradient-to-br from-cream via-white to-brand-50 dark:from-gray-900 dark:via-gray-900 dark:to-gray-800">
      <div class="w-full max-w-md">
        <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-soft border border-gray-100 dark:border-gray-700 p-8 md:p-10">
          <div class="text-center mb-6">
            <a href="../../index.html" class="inline-flex items-center gap-2 mb-2" aria-label="FreshMart home">
              <span class="grid place-items-center w-10 h-10 rounded-full bg-brand-600 text-white">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
                  <path d="M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66.95-2.3c.48.17.98.3 1.34.3C19 20 22 3 22 3c-1 2-8 2.25-13 3.25S2 11.5 2 13.5s1.75 3.75 1.75 3.75C7 8 17 8 17 8z"/>
                </svg>
              </span>
              <span class="text-2xl font-bold tracking-tight">Fresh<span class="text-brand-600">Mart</span></span>
            </a>
          </div>

          <h1 class="text-2xl md:text-3xl font-extrabold text-center text-ink dark:text-white">Create Account</h1>
          <p class="text-center text-gray-500 dark:text-gray-400 text-sm mt-1 mb-6">Join FreshMart and get fresh groceries delivered</p>

          <div id="signup-success-container" class="hidden"></div>

          <form id="signup-form" novalidate>
            <div class="mb-4">
              <label for="name" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Full Name</label>
              <input type="text" id="name" name="name" placeholder="John Doe" required
                class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-ink dark:text-gray-100 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-800 outline-none transition text-sm" />
            </div>
            <div class="mb-4">
              <label for="email" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Email Address</label>
              <input type="email" id="email" name="email" placeholder="you@example.com" required
                class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-ink dark:text-gray-100 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-800 outline-none transition text-sm" />
            </div>
            <div class="mb-4">
              <label for="phone" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Phone Number</label>
              <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567" required
                class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-ink dark:text-gray-100 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-800 outline-none transition text-sm" />
            </div>
            <div class="mb-4">
              <label for="password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Password</label>
              <input type="password" id="password" name="password" placeholder="Min. 8 characters" required
                class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-ink dark:text-gray-100 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-800 outline-none transition text-sm" />
              <div class="mt-2 flex gap-1" id="password-strength">
                <span class="flex-1 h-1.5 rounded-full bg-gray-200 dark:bg-gray-600 transition"></span>
                <span class="flex-1 h-1.5 rounded-full bg-gray-200 dark:bg-gray-600 transition"></span>
                <span class="flex-1 h-1.5 rounded-full bg-gray-200 dark:bg-gray-600 transition"></span>
                <span class="flex-1 h-1.5 rounded-full bg-gray-200 dark:bg-gray-600 transition"></span>
              </div>
              <p id="password-strength-text" class="text-xs text-gray-400 mt-1"></p>
            </div>
            <div class="mb-4">
              <label for="confirm-password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Confirm Password</label>
              <input type="password" id="confirm-password" name="confirm-password" placeholder="Re-enter your password" required
                class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-ink dark:text-gray-100 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-800 outline-none transition text-sm" />
            </div>
            <div class="mb-6">
              <label class="flex items-start gap-2 text-sm text-gray-600 dark:text-gray-400 cursor-pointer">
                <input type="checkbox" name="terms" class="mt-0.5 rounded border-gray-300 dark:border-gray-600 text-brand-600 focus:ring-brand-500" />
                <span>I agree to the <a href="#" class="text-brand-600 hover:text-brand-700 font-semibold">Terms of Service</a> and <a href="#" class="text-brand-600 hover:text-brand-700 font-semibold">Privacy Policy</a></span>
              </label>
            </div>
            <button type="submit" class="w-full py-3 rounded-full bg-brand-600 hover:bg-brand-700 text-white font-bold shadow-soft transition btn-pop text-sm">Create Account</button>
          </form>

          <div class="mt-6 text-center">
            <p class="text-sm text-gray-500 dark:text-gray-400">Already have an account? <a href="../../public/auth/login.html" class="text-brand-600 hover:text-brand-700 font-semibold transition">Login</a></p>
          </div>

          <div class="mt-6">
            <div class="flex items-center gap-3 mb-4">
              <span class="flex-1 border-t border-gray-200 dark:border-gray-600"></span>
              <span class="text-xs text-gray-400 dark:text-gray-500 uppercase tracking-wider font-semibold">Or sign up with</span>
              <span class="flex-1 border-t border-gray-200 dark:border-gray-600"></span>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <button type="button" class="flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 transition text-sm font-semibold text-gray-700 dark:text-gray-300">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google
              </button>
              <button type="button" class="flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 transition text-sm font-semibold text-gray-700 dark:text-gray-300">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
                Apple
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../../src/js/data.js"></script>
    <script src="../../src/js/cart.js"></script>
    <script src="../../src/js/theme.js"></script>
    <script src="../../src/js/form-validation.js"></script>
    <script src="../../src/js/blog.js"></script>
    <script src="../../src/js/script.js"></script>

    <script>
      (() => {
        'use strict';
        const form = document.getElementById('signup-form');
        const passwordInput = document.getElementById('password');
        const strengthBars = document.querySelectorAll('#password-strength span');
        const strengthText = document.getElementById('password-strength-text');

        if (passwordInput && strengthBars.length) {
          passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            let score = 0;
            if (val.length >= 8) score++;
            if (/[a-z]/.test(val) && /[A-Z]/.test(val)) score++;
            if (/\d/.test(val)) score++;
            if (/[^a-zA-Z0-9]/.test(val)) score++;

            const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-brand-500'];
            const labels = ['Weak', 'Fair', 'Good', 'Strong'];
            strengthBars.forEach((bar, i) => {
              bar.className = `flex-1 h-1.5 rounded-full transition ${i < score ? colors[score - 1] : 'bg-gray-200 dark:bg-gray-600'}`;
            });
            if (strengthText) {
              strengthText.textContent = score > 0 ? `Password strength: ${labels[score - 1]}` : '';
              strengthText.className = `text-xs mt-1 ${score > 0 ? (score < 3 ? 'text-orange-500' : 'text-brand-600') : 'text-gray-400'}`;
            }
          });
        }

        if (!form) return;

        form.addEventListener('submit', (e) => {
          e.preventDefault();
          if (FreshMartForms.validateSignupForm(form)) {
            FreshMartForms.showToast('Account created! Redirecting...');
            setTimeout(() => {
              window.location.href = '../../auth/user/user-dashboard.html';
            }, 1500);
          }
        });
      })();
    </script>
  </body>
</html>
